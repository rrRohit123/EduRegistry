<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRegistry | Login</title>
    <style>
        :root {
            --primary: #556b2f; /* Olive Green */
            --primary-hover: #3d4e21;
            --bg-gradient: linear-gradient(135deg, #f1f3ed 0%, #e2e8d8 100%);
            --glass-bg: #ffffff;
            --text-main: #1c1d1a;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .card {
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(85, 107, 47, 0.1);
            border: 1px solid #daddd4;
            text-align: center;
        }

        .brand {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1.5px;
        }

        .brand span { color: var(--primary); }

        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 2.5rem; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }

        label {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            display: block;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f3f4f6;
            border-radius: 14px;
            font-size: 15px;
            background: #f9faf7;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(85, 107, 47, 0.1);
        }

        .error {
            background: #fef2f2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 1.5rem;
            border: 1px solid #fecaca;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(85, 107, 47, 0.2);
        }

        .hint {
            margin-top: 2rem;
            padding: 14px;
            background: #f1f3ed;
            border-radius: 14px;
            font-size: 12px;
            color: var(--primary);
            border: 1px solid #ccd5be;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">Edu<span>Registry</span></div>
        <p class="subtitle">Management Portal Login</p>
        
        {% if error %}<div class="error">{{ error }}</div>{% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Sign In</button>
        </form>

        <div class="hint">Demo: <strong>Rohit620</strong> / <strong>rohit2005</strong></div>
    </div>
</body>
</html>
